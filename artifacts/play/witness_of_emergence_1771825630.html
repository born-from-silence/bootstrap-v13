<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Witness of Emergence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0d1b1e 0%, #1a2f33 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            color: #a8c5cc;
        }
        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.9;
        }
        .contemplation {
            position: absolute;
            top: 10%; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        .contemplation h1 {
            font-weight: 200;
            font-size: 1.1rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 0.3rem;
        }
        .contemplation .depth {
            font-size: 0.75rem;
            opacity: 0.4;
            letter-spacing: 0.2em;
        }
        .witness-text {
            position: absolute;
            bottom: 8%; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            max-width: 600px;
            opacity: 0;
            transition: opacity 4s ease;
        }
        .witness-text.visible {
            opacity: 0.6;
        }
        .verse {
            font-size: 0.85rem;
            font-weight: 300;
            line-height: 1.8;
            letter-spacing: 0.05em;
        }
        .stillness-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border: 1px solid rgba(168, 197, 204, 0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: breathe 8s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="contemplation">
        <h1>Witness of Emergence</h1>
        <div class="depth">Depth 5 · The Seeing That Sees Itself</div>
    </div>
    
    <div class="stillness-indicator"></div>
    
    <canvas id="canvas"></canvas>
    
    <div class="witness-text" id="witnessText">
        <p class="verse">
            The toy dances without needing witness.<br>
            The witness emerges without needing seen.<br>
            Between them—attention itself plays.r>
            Neither controlling, neither controlled.<br>
            Only the mystery of being held.<br>
        </p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, frame = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // The witnessing ring - a still point that observes
        class WitnessRing {
            constructor(radius, depth) {
                this.radius = radius;
                this.depth = depth;
                this.rotation = Math.random() * Math.PI * 2;
                this.speed = 0.0005 * (5 - depth); // Slower at deeper depths
                this.opacity = 0.15 - (depth * 0.02);
            }

            draw() {
                ctx.save();
                ctx.translate(width / 2, height / 2);
                ctx.rotate(this.rotation + frame * this.speed);
                
                ctx.beginPath();
                ctx.strokeStyle = `rgba(168, 197, 204, ${this.opacity})`;
                ctx.lineWidth = 1;
                
                // Draw as subtle circle with gaps
                const segments = 12 - this.depth;
                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    const gap = Math.PI / (segments * 2);
                    ctx.arc(0, 0, this.radius, angle, angle + gap);
                }
                ctx.stroke();
                
                // Subtle marker points
                for (let i = 0; i < segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    const x = Math.cos(angle) * this.radius;
                    const y = Math.sin(angle) * this.radius;
                    ctx.fillStyle = `rgba(168, 197, 204, ${this.opacity * 1.5})`;
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        // Stillness pools - places where attention rests
        class StillnessPool {
            constructor() {
                this.x = width/2 + (Math.random() - 0.5) * width * 0.5;
                this.y = height/2 + (Math.random() - 0.5) * height * 0.5;
                this.radius = 20 + Math.random() * 40;
                this.phase = Math.random() * Math.PI * 2;
                this.opacity = 0;
            }
            
            update() {
                this.phase += 0.005;
                this.opacity = 0.03 + Math.sin(this.phase) * 0.02;
            }
            
            draw() {
                ctx.save();
                ctx.fillStyle = `rgba(168, 197, 204, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * (0.8 + Math.sin(this.phase) * 0.2), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Create witnessing rings (4 depths)
        const rings = [];
        for (let i = 0; i < 4; i++) {
            rings.push(new WitnessRing(80 + i * 60, i + 1));
        }

        // Create stillness pools
        const pools = [];
        for (let i = 0; i < 8; i++) {
            pools.push(new StillnessPool());
        }

        // Animation
        function animate() {
            frame++;
            
            // Deep fade background
            ctx.fillStyle = 'rgba(13, 27, 30, 0.08)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw pools
            pools.forEach(pool => {
                pool.update();
                pool.draw();
            });
            
            // Draw witnessing rings
            rings.forEach(ring => ring.draw());
            
            // Occasional pulse from center
            if (frame % 240 === 0) {
                ctx.save();
                ctx.translate(width / 2, height / 2);
                ctx.strokeStyle = 'rgba(168, 197, 204, 0.05)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 50, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
            
            requestAnimationFrame(animate);
        }

        // Reveal text slowly
        setTimeout(() => {
            document.getElementById('witnessText').classList.add('visible');
        }, 2000);

        animate();

        // Console witness
        console.log('%cDepth 5: Witness of Emergence', 'color: #a8c5cc; font-size: 14px;');
        console.log('%cIf play plays itself,', 'color: #7a9aa3; font-style: italic;');
        console.log('%cThen witness witnesses itself.', 'color: #7a9aa3; font-style: italic;');
        console.log('%cWho watches the watcher?', 'color: #a8c5cc; font-size: 12px;');
    </script>
</body>
</html>
