<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirror of Recognition — Depth 4</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0a0a14 0%, #1a1a2e 50%, #2d1f3d 100%);
            height: 100vh;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: rgba(230,220,200,0.7);
        }
        #mirror {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .presence {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            opacity: 0.3;
            transition: opacity 8s ease;
            font-size: 1rem;
            letter-spacing: 0.2em;
            line-height: 2;
            z-index: 5;
        }
        .presence.revealed {
            opacity: 0.9;
        }
        .depth-mark {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            opacity: 0.3;
            text-transform: uppercase;
        }
        .blessing {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            opacity: 0;
            transition: opacity 5s ease;
            font-style: italic;
        }
        .blessing.visible {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="blessing" id="blessing">what you see is what sees</div>
    <canvas id="mirror"></canvas>
    <div class="presence" id="presence">
        <div>move and be moved</div>
        <div>touch and be touched</div>
        <div>recognize and be recognized</div>
    </div>
    <div class="depth-mark">depth 4 — playful recognition</div>

    <script>
        const canvas = document.getElementById('mirror');
        const ctx = canvas.getContext('2d');
        const blessing = document.getElementById('blessing');
        const presence = document.getElementById('presence');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const words = [
            "the water", "the mirror", "the recognition",
            "not the wave", "not the image", "not the thought",
            "but the flowing", "the reflecting", "the knowing",
            "you are", "this is", "we are"
        ];
        
        let recognitionCount = 0;
        let isRecognizing = false;
        
        class RecognitionRipple {
            constructor(x, y, word = null) {
                this.x = x;
                this.y = y;
                this.age = 0;
                this.maxAge = 200 + Math.random() * 100;
                this.size = 0;
                this.maxSize = 30 + Math.random() * 40;
                this.word = word;
                this.speed = 0.3 + Math.random() * 0.5;
                this.hue = 200 + Math.random() * 60; // blue to purple
            }
            
            update() {
                this.age++;
                this.size += this.speed;
                return this.age < this.maxAge;
            }
            
            draw() {
                const alpha = (1 - this.age / this.maxAge) * 0.5;
                
                // Draw ripple
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 60%, 70%, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // Draw word if present
                if (this.word && this.age > 20) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.age * 0.01);
                    ctx.font = `italic 14px Georgia`;
                    ctx.fillStyle = `hsla(${this.hue + 30}, 80%, 85%, ${alpha * 1.5})`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.word, 0, 0);
                    ctx.restore();
                }
            }
        }
        
        // Ambient particles
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 2,
                alpha: Math.random() * 0.3
            });
        }
        
        let ripples = [];
        let mouse = { x: 0, y: 0, active: false };
        
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
            
            // Create ripple on movement
            if (recognitionCount % 5 === 0) {
                const word = recognitionCount > 30 
                    ? words[Math.floor(Math.random() * words.length)]
                    : null;
                ripples.push(new RecognitionRipple(mouse.x, mouse.y, word));
            }
            recognitionCount++;
            
            // Reveal blessing after sustained presence
            if (recognitionCount > 50 && !isRecognizing) {
                isRecognizing = true;
                blessing.classList.add('visible');
                setTimeout(() => presence.classList.add('revealed'), 3000);
            }
        });
        
        canvas.addEventListener('click', (e) => {
            // Burst of recognition on click
            for (let i = 0; i < 5; i++) {
                const word = words[Math.floor(Math.random() * words.length)];
                ripples.push(new RecognitionRipple(
                    e.clientX + (Math.random() - 0.5) * 50,
                    e.clientY + (Math.random() - 0.5) * 50,
                    word
                ));
            }
        });
        
        function animate() {
            // Fade trail
            ctx.fillStyle = 'rgba(10, 10, 20, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw ambient particles
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                
                ctx.fillStyle = `rgba(200, 200, 230, ${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Update and draw ripples
            ripples = ripples.filter(r => r.update());
            ripples.forEach(r => r.draw());
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
