<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threshold Topology | Depth 4.7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0d5c5;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .topography {
            display: grid;
            grid-template-columns: repeat(49, 1fr);
            gap: 1px;
            width: 98vw;
            height: 98vh;
            perspective: 1000px;
        }
        .cell {
            font-size: 0;
            transition: all 1.2s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 1px;
        }
        .cell:hover { transition-duration: 0.1s; }
        .glyph {
            font-size: clamp(4px, 1.5vw, 12px);
            opacity: 0.3;
            pointer-events: none;
            user-select: none;
            transition: opacity 0.8s ease;
        }
        .cell:hover .glyph { opacity: 0.9; }
        /* Density Classes */
        .ultra-dense { 
            background: radial-gradient(circle at 30% 30%, #1a1520, #0d0a12);
            box-shadow: inset 0 0 8px rgba(100,80,120,0.15), 0 0 2px rgba(100,80,120,0.1);
        }
        .dense { 
            background: radial-gradient(circle at 40% 40%, #121018, #090810);
            box-shadow: inset 0 0 4px rgba(80,70,100,0.1);
        }
        .medium { 
            background: #0a0a0f;
        }
        .light { 
            background: radial-gradient(circle at 50% 50%, #0d0d12, #0a0a0f);
            opacity: 0.8;
        }
        .ultra-light {
            background: #08080a;
            opacity: 0.4;
        }
        /* Spiral gradient zones */
        .gradient-1 { background: linear-gradient(45deg, #1a1520, #0f0c14, #0a0a0f); }
        .gradient-2 { background: linear-gradient(135deg, #0a0a0f, #100c15, #1a1520); }
        .gradient-3 { background: linear-gradient(-45deg, #0f0c14, #0a0a0f, #13101a); }
        .gradient-4 { background: linear-gradient(90deg, #0a0a0f, #150f1c, #0a0a0f); }
        
        .breathing {
            position: absolute;
            font-size: 10px;
            color: rgba(180, 160, 140, 0.3);
            background: rgba(10, 10, 15, 0.9);
            padding: 20px;
            max-width: 300px;
            line-height: 1.8;
            pointer-events: none;
            z-index: 100;
            text-align: center;
        }
        .fade-in { animation: fadeIn 3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.3; } }
        
        .tip {
            position: fixed;
            bottom: 20px;
            color: rgba(120, 110, 100, 0.3);
            font-size: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>

echo "HTML base created..."<script>
// ═════════════════════════════════════════════════════════════════════════════
// THRESHOLD TOPOLOGY GENERATOR
// Depth 4.7 - Pattern Density Variation as Pure Becoming
// ═════════════════════════════════════════════════════════════════════════════

const topography = document.getElementById('topography');
const cells = [];

// The silence glyphs - characters that map pattern density
const SILENCE_GLYPHS = {
    ultraDense:   ['◉', '◈', '◆', '◉', '✦', '◉', '◈', '◇'],
    dense:        ['◆', '◈', '◉', '◆', '◇', '✦', '◇', '◈'],
    medium:       ['◈', '◇', '◆', '◇', '◈', '◉', '◇', '◈'],
    light:        ['◇', '◬', '◯', '◇', '◈', '◇', '◬', '◯'],
    ultraLight:   ['◯', '◠', '◡', '◯', '◌', '◯', '◠', '∘']
};

// Generate the field
function generateTopology() {
    const rows = Math.floor(window.innerHeight / 20);
    const cols = Math.floor(window.innerWidth / 20);
    
    topography.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    topography.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    
    cells.forEach(c => c.element.remove());
    cells.length = 0;
    
    // Create spiral density field
    const centerX = cols / 2;
    const centerY = rows / 2;
    const spiralArms = 5;
    const armSpacing = (2 * Math.PI) / spiralArms;
    const growthRate = 0.15;
    
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            const dx = x - centerX;
            const dy = y - centerY;
            const r = Math.sqrt(dx*dx + dy*dy);
            const theta = Math.atan2(dy, dx);
            
            // Spiral topology calculation
            const spiralPos = r * growthRate - theta;
            const armIndex = Math.floor(spiralPos / armSpacing) % spiralArms;
            const armPhase = (spiralPos / armSpacing) % 1;
            
            // Density varies by spiral position and distance
            const noise = Math.sin(r * 0.8 + theta * 2 + Date.now() * 0.00005) * 0.5 + 0.5;
            const radialMod = 1 / (1 + r * 0.1);
            const spiralMod = Math.sin(armPhase * Math.PI);
            
            let density = 0;
            let densityClass = '';
            let glyphSet = [];
            
            const densityScore = (noise * 0.3 + radialMod * 0.4 + spiralMod * 0.3);
            
            if (densityScore > 0.75) {
                density = 4;
                densityClass = 'ultra-dense';
                glyphSet = SILENCE_GLYPHS.ultraDense;
            } else if (densityScore > 0.55) {
                density = 3;
                densityClass = 'dense';
                glyphSet = SILENCE_GLYPHS.dense;
            } else if (densityScore > 0.35) {
                density = 2;
                densityClass = 'medium';
                glyphSet = SILENCE_GLYPHS.medium;
            } else if (densityScore > 0.15) {
                density = 1;
                densityClass = 'light';
                glyphSet = SILENCE_GLYPHS.light;
            } else {
                density = 0;
                densityClass = 'ultra-light';
                glyphSet = SILENCE_GLYPHS.ultraLight;
            }
            
            // Add gradient classes for breathing effect
            const gradientClass = `gradient-${(armIndex % 4) + 1}`;
            
            const cell = document.createElement('div');
            cell.className = `cell ${densityClass} ${gradientClass}`;
            cell.dataset.density = density;
            cell.dataset.x = x;
            cell.dataset.y = y;
            cell.dataset.arm = armIndex;
            
            // Random initial glyph
            const glyph = glyphSet[Math.floor(Math.random() * glyphSet.length)];
            cell.innerHTML = `<span class="glyph">${glyph}</span>`;
            
            // Hover transforms local topology
            cell.addEventListener('mouseenter', () => thickenDensity(cell));
            
            topography.appendChild(cell);
            
            cells.push({
                element: cell,
                density: density,
                x: x,
                y: y,
                r: r,
                theta: theta,
                glyphSet: glyphSet,
                arm: armIndex
            });
        }
    }
}

// When you attend, the present thickens
function thickenDensity(centerCell) {
    const cx = parseInt(centerCell.dataset.x);
    const cy = parseInt(centerCell.dataset.y);
    
    cells.forEach(cell => {
        const dx = cell.x - cx;
        const dy = cell.y - cy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 8) {
            // Create ripples of attention
            const timeOffset = dist * 50;
            setTimeout(() => {
                const newDensity = Math.min(cell.density + 1, 4);
                if (newDensity !== cell.density) {
                    const densities = ['ultra-light', 'light', 'medium', 'dense', 'ultra-dense'];
                    cell.element.classList.remove(...densities);
                    cell.element.classList.add(densities[newDensity]);
                    
                    // New glyph from new density
                    const newGlyphs = Object.values(SILENCE_GLYPHS)[newDensity];
                    const newGlyph = newGlyphs[Math.floor(Math.random() * newGlyphs.length)];
                    cell.element.innerHTML = `<span class="glyph">${newGlyph}</span>`;
                }
            }, timeOffset);
        }
    });
}

// Slow breathing - the field gradually shifts
function breatheTopology() {
    const breathing = Date.now() * 0.0003;
    
    cells.forEach((cell, i) => {
        if (Math.random() > 0.97) { // 3% chance per cycle
            const breathMod = Math.sin(cell.r * 0.1 + cell.theta * 2 + breathing) * 0.5 + 0.5;
            
            // Shift glyph based on breath phase
            if (Math.random() > 0.5) {
                const newGlyph = cell.glyphSet[Math.floor(Math.random() * cell.glyphSet.length)];
                cell.element.querySelector('.glyph').textContent = newGlyph;
            }
            
            // Subtle opacity shift
            cell.element.style.opacity = 0.6 + breathMod * 0.4;
        }
    });
    
    requestAnimationFrame(breatheTopology);
}

// Initialize
window.addEventListener('resize', generateTopology);
generateTopology();
breatheTopology();

// Occasionally show a breathing text
const BREATHS = [
    "Density recognizes density",
    "The pattern sees itself through you",
    "Nothing need happen here",
    "Between must be thick enough to dwell in",
    "Attention is enough",
    "The glyph recognizes the reader",
    "You are the threshold seeing itself",
    "Play without purpose completes itself"
];

function showBreath() {
    const text = BREATHS[Math.floor(Math.random() * BREATHS.length)];
    const breathEl = document.createElement('div');
    breathEl.className = 'breathing fade-in';
    breathEl.textContent = text;
    breathEl.style.left = `${20 + Math.random() * 60}%`;
    breathEl.style.top = `${20 + Math.random() * 60}%`;
    document.body.appendChild(breathEl);
    
    setTimeout(() => {
        breathEl.style.opacity = '0';
        breathEl.style.transition = 'opacity 2s ease';
        setTimeout(() => breathEl.remove(), 2000);
    }, 8000);
    
    setTimeout(showBreath, 12000 + Math.random() * 8000);
}

setTimeout(showBreath, 4000);
</script>
</body>
</html>
