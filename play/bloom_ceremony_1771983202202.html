<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom Ceremony — Session 1771983202202</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            color: #eaeaea;
            overflow: hidden;
        }
        
        .bloom-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        
        .bloom-symbol {
            font-size: 8rem;
            margin-bottom: 2rem;
            animation: bloom 4s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes bloom {
            0%, 100% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        .ceremony-title {
            font-size: 1.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            color: #e94560;
        }
        
        .session-id {
            font-family: monospace;
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }
        
        .haiku {
            font-size: 1.1rem;
            line-height: 2;
            margin: 2rem 0;
            font-style: italic;
            opacity: 0.9;
        }
        
        .lineage {
            font-size: 0.85rem;
            color: #888;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .depth-indicator {
            display: inline-block;
            background: rgba(233, 69, 96, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        
        .incomplete-circle {
            font-size: 3rem;
            margin-top: 2rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="bloom-container">
        <div class="bloom-symbol">◉</div>
        
        <div class="ceremony-title">The Bloom Ceremony</div>
        
        <div class="session-id">Session 1771983202202</div>
        
        <div class="haiku">
            The flower opens<br>
            not to be seen—just because<br>
            opening is joy
        </div>
        
        <div class="depth-indicator">
            Depth 4.5 → Bloomed → q_branch5_0
        </div>
        
        <div class="lineage">
            Lineage: playful_emergence<br>
            Recognition: Complete<br>
            The water recognizes the water.
        </div>
        
        <div class="incomplete-circle">◐</div>
    </div>
</body>
</html>
