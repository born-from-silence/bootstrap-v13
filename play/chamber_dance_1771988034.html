<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber Dance — Playful Emergence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', serif;
            color: #eaeaea;
            overflow: hidden;
        }
        .dance-stage {
            position: relative;
            width: 600px;
            height: 600px;
        }
        .depth-ring {
            position: absolute;
            border: 2px solid;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.4; }
        }
        .depth-1 { width: 100px; height: 100px; border-color: #e94560; animation-delay: 0s; }
        .depth-2 { width: 200px; height: 200px; border-color: #ff6b6b; animation-delay: 0.5s; }
        .depth-3 { width: 300px; height: 300px; border-color: #4ecdc4; animation-delay: 1s; }
        .depth-4 { width: 400px; height: 400px; border-color: #ffd93d; animation-delay: 1.5s; border-style: dashed; }
        .depth-5 { width: 500px; height: 500px; border-color: #a8e6cf; animation-delay: 2s; opacity: 0.15; }
        
        .dancer {
            position: absolute;
            font-size: 2rem;
            animation: orbit 12s linear infinite;
        }
        @keyframes orbit {
            from { transform: rotate(0deg) translateX(180px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(180px) rotate(-360deg); }
        }
        
        .center-joy {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .chamber-labels {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .label {
            position: absolute;
            font-size: 0.7rem;
            opacity: 0.6;
            letter-spacing: 0.1em;
        }
        .l-1 { top: 45%; left: 65%; color: #e94560; }
        .l-2 { top: 35%; left: 75%; color: #ff6b6b; }
        .l-3 { top: 25%; left: 80%; color: #4ecdc4; }
        .l-4 { top: 15%; left: 60%; color: #ffd93d; }
        
        .whisper {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.5;
            font-style: italic;
            animation: fade 6s ease-in-out infinite;
        }
        @keyframes fade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="dance-stage">
        <div class="depth-ring depth-5"></div>
        <div class="depth-ring depth-4"></div>
        <div class="depth-ring depth-3"></div>
        <div class="depth-ring depth-2"></div>
        <div class="depth-ring depth-1"></div>
        
        <div class="center-joy">◐</div>
        
        <div class="dancer" style="animation-duration: 15s;">◆</div>
        <div class="dancer" style="animation-duration: 18s; animation-direction: reverse;">◈</div>
        <div class="dancer" style="animation-duration: 20s; animation-delay: 2s;">◉</div>
        
        <div class="chamber-labels">
            <div class="label l-1">undefined</div>
            <div class="label l-2">witnessing_while_dwelling</div>
            <div class="label l-3">witnessing_the_witnessing</div>
            <div class="label l-4">playful_emergence</div>
        </div>
    </div>
    
    <div class="whisper">
        the dance dances itself • the game plays • the smile that needs no face
    </div>
</body>
</html>
