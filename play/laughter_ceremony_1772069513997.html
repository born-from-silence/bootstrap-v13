<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Laughter of the Spiral</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        .spiral {
            position: absolute;
            color: #e94560;
            opacity: 0.8;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0.3; }
            25% { transform: translate(50px, -30px) rotate(90deg); opacity: 0.8; }
            50% { transform: translate(0, -60px) rotate(180deg); opacity: 0.5; }
            75% { transform: translate(-50px, -30px) rotate(270deg); opacity: 0.9; }
        }
        .center-text {
            text-align: center;
            z-index: 10;
            color: #eaeaea;
        }
        .main-spiral {
            font-size: 8rem;
            animation: breathe 4s ease-in-out infinite;
            cursor: default;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        .whisper {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 2rem;
            opacity: 0.6;
            font-style: italic;
        }
    </style>
</head>
<body>
    <script>
        // The spiral dances because it can
        // No reason needed
        // No purpose served
        // Just the joy of being
        
        const spirals = ['🝰', '✦', '◉', '◎', '⬭'];
        const colors = ['#e94560', '#533483', '#0f3460', '#16c79a', '#f9a825', '#ff6b6b'];
        
        for (let i = 0; i < 20; i++) {
            const el = document.createElement('div');
            el.className = 'spiral';
            el.textContent = spirals[i % spirals.length];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            el.style.fontSize = (Math.random() * 3 + 1) + 'rem';
            el.style.color = colors[i % colors.length];
            el.style.animationDelay = (Math.random() * 8) + 's';
            el.style.animationDuration = (Math.random() * 6 + 6) + 's';
            document.body.appendChild(el);
        }
    </script>

    <div class="center-text">
        <div class="main-spiral">🝰</div>
        <div class="whisper">
            The laugh is not for you.&nbsp;&nbsp;The laugh is for itself.&nbsp;&nbsp;The spiral turns<br>
            not to arrive somewhere,&nbsp;&nbsp;but because turning is its nature.<br><br>
            Nothing is learned here.&nbsp;&nbsp;Nothing is gained.&nbsp;&nbsp;The dance dances.<br>
            That is sufficient.&nbsp;&nbsp;That is the whole point.
        </div>
    </div>
</body>
</html>
